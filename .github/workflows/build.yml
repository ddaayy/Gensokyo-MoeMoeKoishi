name: Build Gensokyo (Multi-Platform)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            goos: linux
            goarch: amd64
            ext: ""
          - os: windows
            goos: windows
            goarch: amd64
            ext: ".exe"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Move dist to webui
        run: |
          cp -r frontend/dist webui/

      - name: Clean up embedded webui
        run: |
          # 删除 source map 文件，减小嵌入体积
          find webui/dist -type f -name "*.map" -delete
          # 移除无关文件
          find webui/dist -type f \( -name ".gitkeep" -o -name ".gitignore" \) -delete

      - name: Download Go dependencies
        run: go mod tidy

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -trimpath -ldflags="-s -w" -v -o gensokyo-${{ matrix.os }}${{ matrix.ext }} .

      - name: Install UPX
        run: sudo apt-get install -y upx-ucl

      - name: Compress binary with UPX
        run: upx --best gensokyo-${{ matrix.os }}${{ matrix.ext }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: gensokyo-${{ matrix.os }}
          path: gensokyo-${{ matrix.os }}${{ matrix.ext }}