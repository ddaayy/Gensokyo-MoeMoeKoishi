name: Build Gensokyo (Multi-Platform)

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'frontend/**'
      - 'config.yml'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  # 1. 单独构建前端，只执行一次
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Move dist to webui
        run: |
          cp -r frontend/dist webui/

      - name: Clean up embedded webui
        run: |
          find webui/dist -type f -name "*.map" -delete
          find webui/dist -type f \( -name ".gitkeep" -o -name ".gitignore" \) -delete

      - name: Upload webui artifact
        uses: actions/upload-artifact@v4
        with:
          name: webui-dist
          path: webui/dist

  # 2. 多平台编译
  build-binaries:
    needs: build-frontend
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - os: linux
            goos: linux
            goarch: amd64
            ext: ""
          - os: linux
            goos: linux
            goarch: 386
            ext: ""
          - os: linux
            goos: linux
            goarch: arm64
            ext: ""
          # Windows
          - os: windows
            goos: windows
            goarch: amd64
            ext: ".exe"
          - os: windows
            goos: windows
            goarch: 386
            ext: ".exe"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Download webui artifact
        uses: actions/download-artifact@v4
        with:
          name: webui-dist
          path: webui/dist

      - name: Download Go dependencies
        run: go mod tidy

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          go build -trimpath -ldflags="-s -w" -v -o gensokyo-${{ matrix.os }}-${{ matrix.goarch }}${{ matrix.ext }} .

      - name: Install UPX
        run: sudo apt-get install -y upx-ucl

      - name: Compress with UPX
        run: |
          upx -7 gensokyo-${{ matrix.os }}-${{ matrix.goarch }}${{ matrix.ext }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: gensokyo-${{ matrix.os }}-${{ matrix.goarch }}
          path: gensokyo-${{ matrix.os }}-${{ matrix.goarch }}${{ matrix.ext }}

  # 3. 自动发布 Release（仅在打 tag 时触发）
  release:
    needs: build-binaries
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Calculate release number
        id: release_num
        run: |
          MAX=0
          for NAME in $(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases" \
            | python3 -c "import sys,json; [print(r.get('name','')) for r in json.load(sys.stdin)]" 2>/dev/null); do
            if [[ "$NAME" =~ ^Release\ ([0-9]+)$ ]]; then
              NUM=${BASH_REMATCH[1]}
              (( NUM > MAX )) && MAX=$NUM
            fi
          done
          printf 'name=Release %03d\n' $((MAX + 1)) >> $GITHUB_OUTPUT

      - name: Extract release notes from CHANGELOG
        run: |
          SECTION="${{ steps.release_num.outputs.name }}"
          python3 -c "
import re, sys
with open('CHANGELOG.md') as f:
    content = f.read()
pattern = r'## ' + re.escape('$SECTION') + r'(.*?)(?=## |\Z)'
match = re.search(pattern, content, re.DOTALL)
if match:
    sys.stdout.write(match.group())
else:
    print('（请更新 CHANGELOG.md）')
" > release-notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ steps.release_num.outputs.name }}
          body_path: release-notes.md
          files: |
            artifacts/gensokyo-linux-amd64/gensokyo-linux-amd64
            artifacts/gensokyo-linux-386/gensokyo-linux-386
            artifacts/gensokyo-linux-arm64/gensokyo-linux-arm64
            artifacts/gensokyo-windows-amd64/gensokyo-windows-amd64.exe
            artifacts/gensokyo-windows-386/gensokyo-windows-386.exe
          draft: false
          prerelease: false